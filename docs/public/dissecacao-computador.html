<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dissecação de um Computador</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.08);
    --border-active: rgba(99,179,237,0.5);
    --accent: #63b3ed;
    --accent2: #7c3aed;
    --text: #f0f0f8;
    --muted: #8888aa;
    --correct: #34d399;
    --wrong: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,179,237,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,179,237,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 2.5rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .logo {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  header h1 {
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  header p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .score-display {
    margin-left: auto;
    text-align: right;
  }

  .score-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--accent);
  }

  .score-label {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  main {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 0;
    min-height: calc(100vh - 100px);
  }

  /* Sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .sidebar-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    padding: 0 0.5rem;
    margin-bottom: 0.5rem;
  }

  .part-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0.8rem 0.75rem;
    border-radius: 10px;
    border: 1px solid transparent;
    background: transparent;
    cursor: pointer;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    text-align: left;
    transition: all 0.2s;
    width: 100%;
  }

  .part-btn:hover {
    background: var(--surface);
    border-color: var(--border);
  }

  .part-btn.active {
    background: var(--surface2);
    border-color: var(--border-active);
  }

  .part-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .part-info { flex: 1; }
  .part-name { font-weight: 600; font-size: 0.9rem; }
  .part-sub { font-size: 0.75rem; color: var(--muted); }

  .part-tick {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--correct);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .part-btn.done .part-tick { opacity: 1; }

  /* Content area */
  .content {
    padding: 2rem;
    overflow-y: auto;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 1rem;
    color: var(--muted);
  }

  .empty-icon { font-size: 3rem; }
  .empty-text { font-size: 1rem; }

  /* Part detail */
  .part-detail { display: none; animation: fadeIn 0.3s ease; }
  .part-detail.visible { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .detail-header {
    display: flex;
    align-items: flex-start;
    gap: 1.25rem;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .detail-icon {
    width: 64px; height: 64px;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    flex-shrink: 0;
  }

  .detail-title { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }
  .detail-analogy {
    font-size: 0.9rem;
    color: var(--accent);
    margin-top: 4px;
    font-style: italic;
  }

  .detail-desc {
    font-size: 1rem;
    line-height: 1.7;
    color: rgba(240,240,248,0.85);
    margin-bottom: 1.5rem;
  }

  /* Facts */
  .facts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .fact-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.85rem 1rem;
  }

  .fact-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .fact-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
  }

  /* Meters */
  .meters { margin-bottom: 2rem; }
  .meter-row { margin-bottom: 12px; }
  .meter-top { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
  .meter-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .meter-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  /* Quiz */
  .quiz-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
  }

  .quiz-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }

  .quiz-question {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 1rem;
    line-height: 1.4;
  }

  .quiz-opts { display: flex; flex-direction: column; gap: 8px; }

  .quiz-opt {
    padding: 0.7rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .quiz-opt:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(99,179,237,0.08);
  }

  .quiz-opt .opt-letter {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    font-weight: 600;
    flex-shrink: 0;
  }

  .quiz-opt.correct { border-color: var(--correct); background: rgba(52,211,153,0.1); }
  .quiz-opt.correct .opt-letter { background: var(--correct); color: #0a0a0f; }
  .quiz-opt.wrong { border-color: var(--wrong); background: rgba(248,113,113,0.1); }
  .quiz-opt.wrong .opt-letter { background: var(--wrong); color: #0a0a0f; }

  .quiz-feedback {
    margin-top: 0.75rem;
    font-size: 0.85rem;
    font-weight: 500;
    min-height: 20px;
  }

  /* Progress bar at top */
  .progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s ease;
    z-index: 100;
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 999;
    animation: confettiFall 1.2s ease-in forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Mobile */
  @media (max-width: 700px) {
    main { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); padding: 1rem; flex-direction: row; flex-wrap: wrap; gap: 6px; }
    .sidebar-title { display: none; }
    .part-btn { width: auto; padding: 0.5rem 0.75rem; }
    .part-info .part-sub { display: none; }
    .part-tick { display: none; }
    .content { padding: 1.25rem; }
  }
</style>
</head>
<body>

<div class="progress-bar" id="progressBar" style="width:0%"></div>

<header>
  <div class="logo">🖥️</div>
  <div>
    <h1>Dissecação de um Computador</h1>
    <p>Explora cada componente e responde aos quizzes</p>
  </div>
  <div class="score-display">
    <div class="score-num" id="scoreNum">0</div>
    <div class="score-label">pontos</div>
  </div>
</header>

<main>
  <aside class="sidebar">
    <div class="sidebar-title">Componentes</div>
    <div id="partList"></div>
  </aside>

  <section class="content">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">👈</div>
      <div class="empty-text">Escolhe um componente para começar</div>
    </div>
    <div id="detailContainer"></div>
  </section>
</main>

<script>
const parts = [
  {
    id: "cpu",
    name: "CPU",
    sub: "Processador",
    icon: "🧠",
    color: "#63b3ed",
    bg: "rgba(99,179,237,0.15)",
    title: "CPU — Unidade de Processamento Central",
    analogy: "🧠 O cérebro do computador",
    desc: "O CPU executa todas as instruções dos programas — soma números, toma decisões, dá ordens aos outros componentes. Quanto mais rápido e com mais núcleos, mais tarefas consegue fazer ao mesmo tempo. É o componente mais importante do sistema.",
    facts: [
      { label: "Marcas", value: "Intel / AMD" },
      { label: "Velocidade", value: "2–5+ GHz" },
      { label: "Núcleos", value: "2 a 32+" },
      { label: "Socket", value: "LGA / AM5" }
    ],
    meters: [
      { label: "Velocidade de processamento", val: 90, color: "#63b3ed" },
      { label: "Importância no sistema", val: 100, color: "#7c3aed" }
    ],
    quiz: {
      q: "O que acontece se o CPU for mais lento?",
      opts: ["O disco apaga-se", "Tudo fica mais lento", "O monitor apaga", "Nada muda"],
      correct: 1,
      explanation: "O CPU é o cérebro — se for lento, tudo o resto também fica."
    }
  },
  {
    id: "ram",
    name: "RAM",
    sub: "Memória temporária",
    icon: "📋",
    color: "#34d399",
    bg: "rgba(52,211,153,0.15)",
    title: "RAM — Memória de Acesso Aleatório",
    analogy: "📋 A secretária de trabalho",
    desc: "A RAM guarda temporariamente os dados dos programas que estão a correr agora mesmo. É muito mais rápida que o disco rígido mas apaga tudo quando desligas o computador. Mais RAM significa mais programas abertos ao mesmo tempo sem lentidão.",
    facts: [
      { label: "Capacidade típica", value: "8–32 GB" },
      { label: "Velocidade", value: "3200–6000 MHz" },
      { label: "Tipo atual", value: "DDR5" },
      { label: "Volátil?", value: "Sim — apaga" }
    ],
    meters: [
      { label: "Velocidade", val: 80, color: "#34d399" },
      { label: "Capacidade vs disco", val: 20, color: "#63b3ed" }
    ],
    quiz: {
      q: "O que acontece à RAM quando desligas o computador?",
      opts: ["Fica tudo guardado", "Apaga completamente", "Move para o disco", "Vai para a cloud"],
      correct: 1,
      explanation: "A RAM é volátil — toda a informação desaparece ao desligar."
    }
  },
  {
    id: "hdd",
    name: "Disco Rígido",
    sub: "HDD / SSD",
    icon: "🗄️",
    color: "#fbbf24",
    bg: "rgba(251,191,36,0.15)",
    title: "Disco — Armazenamento Permanente",
    analogy: "🗄️ O armário de arquivos",
    desc: "O disco guarda tudo de forma permanente: o sistema operativo, fotos, músicas e documentos. Existem dois tipos principais: HDD (disco magnético giratório, mais lento e barato) e SSD (chips de memória flash, muito mais rápido mas mais caro).",
    facts: [
      { label: "HDD capacidade", value: "500 GB – 20 TB" },
      { label: "SSD velocidade", value: "5–10× mais rápido" },
      { label: "Permanente?", value: "Sim" },
      { label: "Ligação", value: "SATA / NVMe" }
    ],
    meters: [
      { label: "Velocidade (SSD)", val: 95, color: "#fbbf24" },
      { label: "Capacidade de armazenamento", val: 95, color: "#f59e0b" }
    ],
    quiz: {
      q: "Qual é a principal diferença entre HDD e SSD?",
      opts: ["A cor", "SSD é mais rápido", "HDD tem mais memória RAM", "São iguais"],
      correct: 1,
      explanation: "SSD usa chips de memória, por isso é muito mais rápido que o HDD mecânico."
    }
  },
  {
    id: "gpu",
    name: "GPU",
    sub: "Placa gráfica",
    icon: "🎨",
    color: "#a78bfa",
    bg: "rgba(167,139,250,0.15)",
    title: "GPU — Placa Gráfica",
    analogy: "🎨 O especialista em imagens",
    desc: "A GPU processa tudo o que vês no ecrã — jogos, vídeos, animações. Tem milhares de núcleos pequenos que trabalham em paralelo. Hoje em dia também é usada para Inteligência Artificial, pois é muito boa a fazer muitos cálculos ao mesmo tempo.",
    facts: [
      { label: "Marcas", value: "NVIDIA / AMD" },
      { label: "Memória própria", value: "VRAM 4–24 GB" },
      { label: "Núcleos", value: "1.000–16.000+" },
      { label: "Uso IA", value: "Sim, muito" }
    ],
    meters: [
      { label: "Performance gráfica", val: 95, color: "#a78bfa" },
      { label: "Uso em IA", val: 88, color: "#7c3aed" }
    ],
    quiz: {
      q: "Para além de jogos, o que usa muito a GPU atualmente?",
      opts: ["Imprimir documentos", "Inteligência Artificial", "Ligar à internet", "Reproduzir música"],
      correct: 1,
      explanation: "Os modelos de IA como o ChatGPT treinam em GPUs por serem excelentes a cálculos paralelos."
    }
  },
  {
    id: "mb",
    name: "Motherboard",
    sub: "Placa principal",
    icon: "🏙️",
    color: "#f472b6",
    bg: "rgba(244,114,182,0.15)",
    title: "Motherboard — Placa Principal",
    analogy: "🏙️ A cidade que liga tudo",
    desc: "A motherboard é a placa onde todos os componentes se encaixam e comunicam entre si. Tem slots para CPU, RAM, GPU, e discos. Também contém o BIOS/UEFI — o software que arranca quando ligas o computador antes do sistema operativo.",
    facts: [
      { label: "Formatos", value: "ATX / mATX / ITX" },
      { label: "Tem BIOS?", value: "Sim, sempre" },
      { label: "Slots RAM", value: "2 a 8 slots" },
      { label: "Slots GPU", value: "PCIe x16" }
    ],
    meters: [
      { label: "Essencial para o sistema", val: 100, color: "#f472b6" },
      { label: "Complexidade interna", val: 85, color: "#ec4899" }
    ],
    quiz: {
      q: "O que é o BIOS na motherboard?",
      opts: ["Um tipo de RAM", "O software de arranque básico", "A ventoinha principal", "Uma marca de disco"],
      correct: 1,
      explanation: "O BIOS/UEFI é o primeiro software que corre ao ligar o PC, antes do Windows ou Linux."
    }
  },
  {
    id: "psu",
    name: "Fonte",
    sub: "Alimentação",
    icon: "⚡",
    color: "#fb923c",
    bg: "rgba(251,146,60,0.15)",
    title: "Fonte de Alimentação — PSU",
    analogy: "⚡ O coração elétrico",
    desc: "A fonte converte a corrente da tomada (220V alternada) em corrente contínua adequada para os componentes (3.3V, 5V, 12V). Se a fonte for fraca ou de má qualidade, o computador pode desligar aleatoriamente, ser instável ou danificar peças.",
    facts: [
      { label: "Potência típica", value: "450 W – 1200 W" },
      { label: "Entrada", value: "220V AC" },
      { label: "Saídas", value: "3.3V / 5V / 12V" },
      { label: "Certificação", value: "80 PLUS" }
    ],
    meters: [
      { label: "Importância para estabilidade", val: 90, color: "#fb923c" },
      { label: "Qualidade afeta tudo", val: 85, color: "#f97316" }
    ],
    quiz: {
      q: "O que significa a certificação '80 PLUS' numa fonte?",
      opts: ["Tem 80 conectores", "É 80% eficiente ou mais", "Dura 80 anos", "Custa 80 euros"],
      correct: 1,
      explanation: "80 PLUS significa que pelo menos 80% da eletricidade é convertida útilmente, desperdiçando menos calor."
    }
  },
  {
    id: "cooler",
    name: "Arrefecimento",
    sub: "Cooler / ventoinhas",
    icon: "❄️",
    color: "#67e8f9",
    bg: "rgba(103,232,249,0.15)",
    title: "Sistema de Arrefecimento",
    analogy: "❄️ O ar condicionado do CPU",
    desc: "O CPU e a GPU geram muito calor a trabalhar. O sistema de arrefecimento — ventoinhas, dissipadores de calor ou refrigeração líquida — remove esse calor. Sem arrefecimento adequado, os componentes aquecem tanto que ficam mais lentos automaticamente ou até se danificam.",
    facts: [
      { label: "Tipos", value: "Ar / Líquida" },
      { label: "Pasta térmica", value: "Entre CPU e cooler" },
      { label: "Temp. máx CPU", value: "~90°C" },
      { label: "AIO", value: "All-in-One líquido" }
    ],
    meters: [
      { label: "Necessidade sem cooler", val: 100, color: "#67e8f9" },
      { label: "Impacto no desempenho", val: 80, color: "#22d3ee" }
    ],
    quiz: {
      q: "O que é a pasta térmica?",
      opts: ["Cola para colar o CPU", "Material condutor entre CPU e cooler", "Um tipo de RAM especial", "Lubrificante das ventoinhas"],
      correct: 1,

  },
  {
    id: "os",

    sub: "Windows / Linux / macOS",
    icon: "💻",

    analogy: "👮 O gestor de tráfego",
    desc: "O sistema operativo (Windows, macOS, Linux) é o software que coordena todos os componentes de hardware e permite correr outros programas. É a primeira coisa a arrancar após o BIOS. Fica guardado no disco rígido e é carregado para a RAM ao arrancar.",
    facts: [
      { label: "Exemplos", value: "Windows / Linux / macOS" },
      { label: "Guardado em", value: "Disco rígido" },
      { label: "Carregado para", value: "RAM ao arrancar" },
      { label: "Kernel", value: "Núcleo do sistema" }
    ],

      { label: "Importância (sem ele nada corre)", val: 100, color: "#86efac" },
      { label: "Uso de RAM base", val: 35, color: "#4ade80" }
    ],
    quiz: {
      q: "Qual destes NÃO é um sistema operativo?",

];

let score = 0;
let answered = new Set();
let quizAnsweredNow = false;

const letters = ["A", "B", "C", "D"];

function init() {
  const list = document.getElementById("partList");
  parts.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "part-btn";
    btn.id = "btn-" + p.id;
    btn.innerHTML = `
      <div class="part-icon" style="background:${p.bg}; color:${p.color}">${p.icon}</div>
      <div class="part-info">
        <div class="part-name">${p.name}</div>
        <div class="part-sub">${p.sub}</div>
      </div>
      <div class="part-tick">✓</div>
    `;
    btn.onclick = () => showPart(p);
    list.appendChild(btn);
  });
}

function showPart(p) {
  document.querySelectorAll(".part-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("btn-" + p.id).classList.add("active");
  document.getElementById("emptyState").style.display = "none";
  quizAnsweredNow = false;

  const metersHTML = p.meters.map(m => `
    <div class="meter-row">
      <div class="meter-top"><span>${m.label}</span><span>${m.val}%</span></div>
      <div class="meter-track">
        <div class="meter-fill" data-val="${m.val}" style="background:${m.color}; width:0%"></div>
      </div>
    </div>
  `).join("");

  const factsHTML = p.facts.map(f => `
    <div class="fact-card">
      <div class="fact-label">${f.label}</div>
      <div class="fact-value">${f.value}</div>
    </div>
  `).join("");

  const optsHTML = p.quiz.opts.map((o, i) => `
    <button class="quiz-opt" onclick="answerQuiz(${i}, ${p.quiz.correct}, '${p.id}', '${p.quiz.explanation.replace(/'/g, "\\'")}', this)">
      <span class="opt-letter">${letters[i]}</span>
      ${o}
    </button>
  `).join("");

  const container = document.getElementById("detailContainer");
  container.innerHTML = `
    <div class="part-detail visible">
      <div class="detail-header">
        <div class="detail-icon" style="background:${p.bg}; color:${p.color}">${p.icon}</div>
        <div>
          <div class="detail-title">${p.title}</div>
          <div class="detail-analogy">${p.analogy}</div>
        </div>
      </div>
      <p class="detail-desc">${p.desc}</p>
      <div class="facts-grid">${factsHTML}</div>
      <div class="meters">${metersHTML}</div>
      <div class="quiz-section">
        <div class="quiz-badge">🧩 Quiz rápido</div>
        <div class="quiz-question">${p.quiz.q}</div>
        <div class="quiz-opts">${optsHTML}</div>
        <div class="quiz-feedback" id="qFeedback"></div>
      </div>
    </div>
  `;

  // Animate meters
  setTimeout(() => {
    document.querySelectorAll(".meter-fill").forEach(el => {
      el.style.width = el.dataset.val + "%";
    });
  }, 50);
}

window.answerQuiz = function(idx, correct, partId, explanation, el) {
  if (quizAnsweredNow) return;
  quizAnsweredNow = true;

  const opts = document.querySelectorAll(".quiz-opt");
  const feedback = document.getElementById("qFeedback");

  opts.forEach((o, i) => {
    o.disabled = true;
    if (i === correct) o.classList.add("correct");
    else if (i === idx && idx !== correct) o.classList.add("wrong");
  });

  if (idx === correct) {
    feedback.innerHTML = `<span style="color:var(--correct)">✅ Correto! </span><span style="color:var(--muted)">${explanation}</span>`;
    if (!answered.has(partId)) {
      score += 10;
      document.getElementById("scoreNum").textContent = score;
      answered.add(partId);
      document.getElementById("btn-" + partId).classList.add("done");
      if (score % 30 === 0) launchConfetti();
    }
  } else {
    feedback.innerHTML = `<span style="color:var(--wrong)">❌ Não era bem essa. </span><span style="color:var(--muted)">${explanation}</span>`;
    answered.add(partId);
    document.getElementById("btn-" + partId).classList.add("done");
  }

  // Update progress
  const pct = (answered.size / parts.length) * 100;
  document.getElementById("progressBar").style.width = pct + "%";
};

function launchConfetti() {
  const colors = ["#63b3ed", "#7c3aed", "#34d399", "#fbbf24", "#f472b6", "#fb923c"];
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const el = document.createElement("div");
      el.className = "confetti-piece";
      el.style.cssText = `
        left: ${Math.random() * 100}vw;
        top: -10px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        transform: rotate(${Math.random() * 360}deg);
        animation-delay: ${Math.random() * 0.3}s;
        animation-duration: ${0.8 + Math.random() * 0.8}s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1500);
    }, i * 20);
  }
}

init();
</script>
</body>
</html>
